<svg width="16" height="16" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg" fill="none">
  <!-- Git branch: two nodes connected by a branch line -->
  <!-- Bottom node (main branch head) -->
  <circle cx="4" cy="12" r="1.8" fill="currentColor" />
  <!-- Top-right node (branch tip) -->
  <circle cx="12" cy="4" r="1.8" fill="currentColor" />
  <!-- Branch line: main goes up, then curves right to the branch tip -->
  <path
    d="M4 10.2 V 6.5 C 4 5 5 4 6.5 4 H 10"
    stroke="currentColor"
    stroke-width="1.4"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
  />
</svg>
